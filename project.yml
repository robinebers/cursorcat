name: CursorCat

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    PRODUCT_NAME: CursorCat
    PRODUCT_BUNDLE_IDENTIFIER: com.sunstory.cursorcat
    MARKETING_VERSION: "0.1.9"
    CURRENT_PROJECT_VERSION: "0.1.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: CursorCat
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHighResolutionCapable: YES
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    OTHER_LDFLAGS:
      - "$(inherited)"
      - "-lsqlite3"
  configs:
    Debug:
      CODE_SIGN_ENTITLEMENTS: script/CursorCat.dev.entitlements.plist

targets:
  CursorCat:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/CursorCat
        excludes:
          - Resources/**
      - path: Sources/CursorCat/Resources
        buildPhase: resources
      - path: Resources/AppIcon/AppIcon.icon
        buildPhase: resources
