name: CursorCat

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    PRODUCT_NAME: CursorCat
    PRODUCT_BUNDLE_IDENTIFIER: com.sunstory.cursorcat
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: CursorCat
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHighResolutionCapable: YES
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    CODE_SIGN_ENTITLEMENTS: script/Cursorcat.dev.entitlements.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    OTHER_LDFLAGS:
      - "$(inherited)"
      - "-lsqlite3"

targets:
  CursorCat:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Cursorcat
        excludes:
          - Resources/**
      - path: Sources/Cursorcat/Resources
        buildPhase: resources
      - path: Resources/AppIcon/AppIcon.icon
        buildPhase: resources
